    tier: critical
    aliases: [Aave, AAVE]
    event_keywords:
      launch: ["v4 live", "aave v4", "mainnet launch", "v4 deployed"]
      freeze: ["frozen", "pause", "paused", "halt"]
      depeg: ["rseth incident", "usds depeg", "collateral issue"]
      integration: ["listed on", "integration with"]
      tvl_milestone: ["tvl crossed", "tvl passed", "30m deposit", "50m deposit", "100m deposit"]
      governance: ["aip-", "proposal", "on-chain vote"]

  - name: uniswap
