# Telegram delivery map — единственный bot, три topic.

bot:
  username: OpenClawMacBook_ConductorBot
  token_env: TELEGRAM_BOT_TOKEN   # value lives in .env, chmod 600

chat:
  id: -1003981168546
  internal_id: 3981168546          # for t.me/c/<internal_id>/<topic>/<msg> links
  operator_id: 365840120           # only replies from this user trigger record.py

topics:
  # main — где оператор видит решения. Сюда идут карточки BUY PROBE / WATCH / SKIP.
  decisions:
    id: 203
    name: schema
    description: Главный DeFi operator топик — по 3-5 карточек в день

  # alerts — только срочные противоречия и risk_overlay blocks (≤3 в день)
  alerts:
    id: 206
    name: alerts
    description: Urgent contradictions + risk-blocked clusters

  # debug — dry-run dumps на Sprint 1-3, self-check что ingest не пустой
  debug:
    id: 208
    name: signals
    description: Low-priority signal dumps (disable in production)
    send_in_dry_run_only: true

limits:
  max_decisions_per_day: 5
  max_alerts_per_day: 3
  soft_cap_per_hour: 1   # anti-spam

replies:
  # Операторский синтаксис в ответах — парсится record.py reply-watcher.
  enter:    "=ВХОЖУ <id> at <price>"
  ignore:   "=ИГНОР <id> [reason]"
  exit:     "=ВЫХОЖУ <id> at <price>"
  defer:    "=ПОЗЖЕ <id>"
